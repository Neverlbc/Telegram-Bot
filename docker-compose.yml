version: "3.8"

services:
  # ── Bot 应用 ────────────────────────────────────────
  bot:
    build: .
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./google_credentials.json:/app/google_credentials.json:ro
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - bot-network
    # 生产环境 Webhook 模式启用端口映射
    # ports:
    #   - "${WEBHOOK_PORT:-8443}:${WEBHOOK_PORT:-8443}"

  # ── Redis 缓存 ──────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: >
      redis-server
      --appendonly yes
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - bot-network

  # ── 库存同步定时任务 ────────────────────────────────────
  inventory-sync:
    build: .
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./google_credentials.json:/app/google_credentials.json:ro
    command: >
      sh -c "while true; do
        python -m bot.sync;
        sleep 300;
      done"
    networks:
      - bot-network

  # ── 服务中心检修状态监听 ─────────────────────────────────
  repair-monitor:
    build: .
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./google_credentials.json:/app/google_credentials.json:ro
    command: >
      sh -c "while true; do
        python -m bot.repair_monitor;
        sleep 300;
      done"
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - bot-network

volumes:
  redis_data:

networks:
  bot-network:
    driver: bridge
